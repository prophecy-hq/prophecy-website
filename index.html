<!DOCTYPE html>
<html>

<head>

  <link rel="stylesheet" href="style.css">
  <title>My first three.js app</title>
  <script id="vertexShader" type="x-shader/x-vertex">
          void main() { 
            vec4 modelViewPosition = modelViewMatrix * vec4(position, 1.0);
            gl_Position = projectionMatrix * modelViewPosition;
          }
      
</script>
  <script id="fragmentShader" type="x-shader/x-fragment">
            uniform vec3 vertColor; 
            uniform float opacity;
            
            float rand(vec2 co){
                return fract(sin(dot(co.xy ,vec2(12.9898,78.233))) * 43758.5453);
            }
            
            void main() {
              vec4 color = vec4(vertColor,1.0);
              color.w = (0.01+pow(rand(gl_FragCoord.xy*0.001), 0.4));
              gl_FragColor = color;
            }
    </script>
</head>

<body>
  <div class="background">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.js"></script>
    <script src="seedrandom.js"></script>

    <!-- <script src="THREE.MeshLine.js"></script> -->

    <script type="module">

      ///////////////////////////////////////////////////////////////////////////////////
      /////////  Imports      //////////////////////////////////////////////////////
      ///////////////////////////////////////////////////////////////////////////////////

      // import { OrbitControls } from 'https://cdn.skypack.dev/three@v0.128.0-FqqdQBPsDVJuf7F4I6W0/examples/jsm/controls/OrbitControls.js';
      // const glslify = require('glslify')


      ///////////////////////////////////////////////////////////////////////////////////
      /////////  Declarations      //////////////////////////////////////////////////////
      ///////////////////////////////////////////////////////////////////////////////////


      
      
      let composer;
      let camera, controls, scene, renderer;
      let clock;
      let box;
      var forwardDirection = true; 

      var width = window.innerWidth;
      var height = window.innerHeight;
      // var width = 960;
      // var height = 960;

      var colors = [0x27007F, 0x00A6FF, 0xFF216E, 0xFFB7E3, 0xFFFFFF];
      var allLines= [];
      var startingPoints = []; var destinationPoints = [];
      
      var uniforms = {
            vertColor: {type:'vec3', value: new THREE.Color(returnColor()), },
            opacity: {type: 'float', value: returnOpacity() },
          }

     

      function returnColor() {
        
        return colors[Math.trunc(Math.random()*colors.length)]
      }
      

      function returnOpacity(){
        return Math.random()*2;
      }

      function returnUniforms(){
        var uniforms = {
            vertColor: {type:'vec3', value: new THREE.Color(returnColor()), },
            opacity: {type: 'float', value: returnOpacity() },
          }

          return uniforms;
      }


      Math.seedrandom(Math.random(999999).toString());


      var Line = function (x1, y1, x2, y2) {
        this.x1 = x1 || 0;
        this.y1 = y1 || 0;
        this.x2 = x2 || 0;
        this.y2 = y2 || 0;
        this.isReverse = false;
      }

      Line.prototype = {
        constructor: Line,

        getLine: function () {
          var cx = (this.x1 + this.x2) * 0.5;
          var cy = (this.y1 + this.y2) * 0.5;

          var a = this.x1 - this.x2;
          var b = this.y1 - this.y2;

          var c = Math.sqrt(a * a + b * b);

          var h = c * 0.5;
          var ang = Math.atan2(this.y2 - this.y1, this.x2 - this.x1);
          var des = Math.sqrt(h * h * (4 / 3)) * 0.5;

          return new Line(cx + Math.cos(ang + Math.PI / 2) * des, cy + Math.sin(ang + Math.PI / 2) * des, cx + Math.cos(ang - Math.PI / 2) * des, cy + Math.sin(ang - Math.PI / 2) * des);
        },

        drawLine: function () {

          // var points = [];
          // points.push(new THREE.Vector3(this.x1, this.y1, 0));
          // points.push(new THREE.Vector3(this.x2, this.y2, 0));

          
          startingPoints.push(new THREE.Vector3(this.x1, this.y1, 0));
          destinationPoints.push(new THREE.Vector3(this.x2, this.y2, 0));
          
          var points = [];
          var rand = Math.random();
          points.push(new THREE.Vector3(this.x1, this.y1, 0));
          points.push(new THREE.Vector3(this.x2, this.y2, 0));

          // var geometry = new THREE.BufferGeometry().setFromPoints(points);
          var geometry = new THREE.BufferGeometry().setFromPoints(points);

          geometry.attributes.position.needsUpdate = true;
          geometry.verticesNeedUpdate = true;
          

          // var material = new THREE.LineBasicMaterial({
          //   color: returnColor(),
          //   transparent: true,
          //   opacity: Math.random()*4*Math.random(),
          // });

          var material = new THREE.ShaderMaterial({
            uniforms: returnUniforms(),
            vertexShader: document.getElementById( 'vertexShader' ).textContent,
	          fragmentShader: document.getElementById( 'fragmentShader' ).textContent
          });

          material.transparent = true;

   

          var line = new THREE.Line(geometry, material);
          allLines.push(line);
          scene.add(line);
       

          var cx = (this.x1 + this.x2) * 0.5;
          var cy = (this.y1 + this.y2) * 0.5;

          var a = this.x1 - this.x2;
          var b = this.y1 - this.y2;

          var c = Math.sqrt(a * a + b * b);

          var h = c * 0.5;
          var ang = Math.atan2(this.y2 - this.y1, this.x2 - this.x1);
          var des = Math.sqrt(h * h * (4 / 3)) * 0.5;

          points = [];
          points.push(new THREE.Vector3(cx + Math.cos(ang + Math.PI / 2) * des, cy + Math.sin(ang + Math.PI / 2) * des, 0));
          points.push(new THREE.Vector3((cx + Math.cos(ang - Math.PI / 2) * des), (cy + Math.sin(ang - Math.PI / 2) * des), 0));

          startingPoints.push(new THREE.Vector3(cx + Math.cos(ang + Math.PI / 2) * des, cy + Math.sin(ang + Math.PI / 2) * des, 0));
          destinationPoints.push(new THREE.Vector3(cx + Math.cos(ang - Math.PI / 2) * des, cy + Math.sin(ang - Math.PI / 2) * des, 0));

          geometry = new THREE.BufferGeometry().setFromPoints(points);

          geometry.attributes.position.needsUpdate = true;
          geometry.verticesNeedUpdate = true;


          line = new THREE.Line(geometry, material);
          allLines.push(line);
          scene.add(line);
          
          
        },

      }

    

      init();
      animate();

      ///////////////////////////////////////////////////////////////////////////////////
      /////////  Init      //////////////////////////////////////////////////////
      ///////////////////////////////////////////////////////////////////////////////////

      function init() {


        ///////////////////////////////////////////////////////////////////////////////////
        /////////  Camera, Clock, Scene      //////////////////////////////////////////////////////
        ///////////////////////////////////////////////////////////////////////////////////

        //  camera = new THREE.OrthographicCamera( width / - 1, width / 1, height / 1, height / - 1, -1000, 1000 );
        camera = new THREE.PerspectiveCamera(90, width / height, 1, 1000);
        camera.position.z = 800;
        camera.position.x = -width / 4;
        camera.position.y = -height / 4;
       
        camera.rotation.z = 0;

        clock = new THREE.Clock();
       

        //    camera = new THREE.PerspectiveCamera( 45, window.innerWidth / window.innerHeight, 1, 500 );
        // camera.position.set( 0, 0, 100 );


        scene = new THREE.Scene();



   
        var ss = width / 6;
      

        var hh = Math.sqrt(ss * ss * 0.75);
        

        var cc = Math.trunc(height / hh);
        
     

        var ccc = Math.round(cc * 6);
        // var ccc = 60;
      
   


        for (let j = 0; j < ccc; j++) {
          var x = Math.trunc(Math.random()*cc);
          var y = Math.trunc(Math.random()*cc);
          var dy = (y % 2) * 0.5;
          var x1 = (x - cc * 0.5 + dy) * ss;
          var y1 = (y - cc * 0.5) * hh;
          var ang = (Math.trunc(Math.random()*3) * 120 + 30) * Math.PI / 180;
          var ddd = Math.trunc((Math.random()*cc/3)+1) * 2;
          var x2 = x1 + Math.cos(ang) * hh * ddd;
          var y2 = y1 + Math.sin(ang) * hh * ddd;

          var lines = [];
          // ArrayList<Line> lines = new ArrayList<Line>();


          lines.push(new Line(x1, y1, x2, y2));
          // lines.add(new Line(x1, y1, x2, y2));


          var sub = Math.random()*8;


          for(let i = 0; i < sub; i++){
            var l = lines[lines.length-1];
            lines.push(l.getLine());

          }


          for (let i = 0; i < lines.length; i++) {
            var l = lines[i];
            l.drawLine();
          }

        }



         box = new THREE.Mesh(new THREE.BoxGeometry(100,100), new THREE.MeshBasicMaterial());
        scene.add(box);


        ///////////////////////////////////////////////////////////////////////////////////
        /////////  Renderer, Controls & Post Processing    ////////////////////////////////
        ///////////////////////////////////////////////////////////////////////////////////



        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });

        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        console.log(allLines[3]);


        // scene.add(mesh);


      }


      //////////////////////////////////////////////////////////////////////////////
      /////////  Animate      //////////////////////////////////////////////////////
      //////////////////////////////////////////////////////////////////////////////


      function animate() {

        const delta = clock.getDelta();      

       
        for(let i = 0; i<startingPoints.length;i++){
          //X*t + Y*(1-t)

          // let i=0;
          
        
          var positions = allLines[i].geometry.attributes.position.array;

          var distance = Math.sqrt((destinationPoints[i].y - startingPoints[i].y)*(destinationPoints[i].y - startingPoints[i].y) + (destinationPoints[i].x - startingPoints[i].x)*(destinationPoints[i].x - startingPoints[i].x));
       
    
          var t = distance/1000;
          var currentDistance = Math.sqrt((startingPoints[i].y - positions[4])*(startingPoints[i].y - positions[4]) + (startingPoints[i].x - positions[3])*(startingPoints[i].x - positions[3]));
          var angle = Math.atan((destinationPoints[i].y - startingPoints[i].y)/(destinationPoints[i].x - startingPoints[i].x));
          var ispositive = true;
          if(angle<0) {
            ispositive = false;
          }
          if(angle > 0){
            ispositive = true;
          }

          var speed = 0.005;
          // console.log(currentDistance/distance);
         if(currentDistance/distance > 0.95) { allLines[i].isReverse = true;  } 
         if(currentDistance/distance < 0.05) { allLines[i].isReverse = false; }
          // console.log(Math.cos(angle));
          
          // if(positions[3] < destinationPoints[i].x && positions[4] < destinationPoints[i].y){
          if(!allLines[i].isReverse){  
            
            if(ispositive){
          positions[3] += (distance-currentDistance)*Math.cos(angle)*speed;
          positions[4] += (distance-currentDistance)*Math.sin(angle)*speed;
            }

    

             if(!ispositive){
              positions[3] -= (distance-currentDistance)*Math.cos(angle)*speed;
              positions[4] -= (distance-currentDistance)*Math.sin(angle)*speed;
            }
          }


          if(allLines[i].isReverse){  
            if(ispositive){
          positions[3] -= (distance-currentDistance)*Math.cos(angle)*speed;
          positions[4] -= (distance-currentDistance)*Math.sin(angle)*speed;
            }



             if(!ispositive){
              positions[3] += (distance-currentDistance)*Math.cos(angle)*speed;
              positions[4] += (distance-currentDistance)*Math.sin(angle)*speed;
            }
          }

            


          allLines[i].geometry.attributes.position.needsUpdate = true;
           
        }

        box.rotation.z += 0.1;

        requestAnimationFrame(animate);
       
        render();

      }

      ///////////////////////////////////////////////////////////////////////////////
      /////////  Render      //////////////////////////////////////////////////////
      /////////////////////////////////////////////////////////////////////////////


      function render() {

        // position.needsUpdate = true;

        // controls.update();
        // requestAnimationFrame( render );
        renderer.render(scene, camera);
        // console.log(scene.children.filter(e => e instanceof THREE.Line)[3].geometry.attributes.position.array)

      }
      


    </script>
  </div>

</body>

</html>
